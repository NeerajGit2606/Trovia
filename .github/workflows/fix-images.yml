name: Fix Product Images (run once)

on:
  workflow_dispatch:

jobs:
  fix-images:
    name: Delete sample products + update image URLs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy scripts to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "cleanup_samples.js,fix_images.js"
          target: "/home/ec2-user/"

      - name: Run cleanup + image fix inside backend container
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/Trovia
            git pull origin main
            CONTAINER=$(docker-compose ps -q backend)
            docker cp /home/ec2-user/cleanup_samples.js $CONTAINER:/app/cleanup_samples.js
            docker cp /home/ec2-user/fix_images.js $CONTAINER:/app/fix_images.js
            echo "--- Step 1: Delete sample products ---"
            docker-compose exec -T backend node cleanup_samples.js
            echo "--- Step 2: Fix product image URLs ---"
            docker-compose exec -T backend node fix_images.js
